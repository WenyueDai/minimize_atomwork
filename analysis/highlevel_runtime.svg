<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1000" viewBox="0 0 1280 1000" role="img" aria-labelledby="title desc">
  <title id="title">minimum_atomworks Runtime Overview</title>
  <desc id="desc">Main pipeline flow, plus two large-dataset execution strategies with clear data movement.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2f3a"/>
    </marker>
    <marker id="arrowdash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5a6976"/>
    </marker>
    <style>
      .bg { fill: #f7f6f1; }
      .title { font: 700 32px Helvetica, Arial, sans-serif; fill: #15202a; }
      .subtitle { font: 400 14px Helvetica, Arial, sans-serif; fill: #5a6976; }
      .lane-label { font: 700 16px Helvetica, Arial, sans-serif; fill: #15202a; }
      .box { stroke-width: 2.2; rx: 10; ry: 10; }
      .input { fill: #e3f2fd; stroke: #1565c0; stroke-width: 2.2; }
      .stage { fill: #fffef9; stroke: #1f2f3a; stroke-width: 2.2; }
      .output { fill: #e8f5e9; stroke: #2d6e4a; stroke-width: 2.2; }
      .optional { fill: #f3e5f5; stroke: #5a3e7f; stroke-width: 2; }
      .label { font: 700 16px Helvetica, Arial, sans-serif; fill: #15202a; }
      .body { font: 400 13px Helvetica, Arial, sans-serif; fill: #233240; }
      .small { font: 400 12px Helvetica, Arial, sans-serif; fill: #5a6976; }
      .micro { font: 400 11px Helvetica, Arial, sans-serif; fill: #5a6976; }
      .line { stroke: #1f2f3a; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #5a6976; stroke-width: 2; fill: none; marker-end: url(#arrowdash); stroke-dasharray: 5,5; }
      .lane { fill: none; stroke: #d7d2c5; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="1000"/>
  <text class="title" x="60" y="50">minimum_atomworks: Runtime Execution Flows</text>
  <text class="subtitle" x="60" y="70">One core pipeline (3 stages) + two large-dataset scaling strategies</text>

  <!-- MAIN LANE -->
  <line class="lane" x1="60" y1="105" x2="1220" y2="105"/>
  <text class="lane-label" x="60" y="98">Core Pipeline:  Input → Prepare → Run Plugins → Merge → Output → (Optional) Dataset Analysis</text>

  <!-- INPUT -->
  <rect class="box input" x="70" y="130" width="140" height="80"/>
  <text class="label" x="85" y="160">Input</text>
  <text class="body" x="85" y="180">PDB/CIF files</text>

  <!-- STAGE 1: PREPARE -->
  <rect class="box stage" x="250" y="110" width="200" height="120"/>
  <text class="label" x="270" y="140">Stage 1: Prepare</text>
  <text class="small" x="270" y="160">• Load structures</text>
  <text class="small" x="270" y="176">• Apply manipulations</text>
  <text class="small" x="270" y="192">• Build base tables</text>
  <text class="micro" x="270" y="205">(structures/chains/roles/</text>
  <text class="micro" x="270" y="217">interfaces)</text>

  <!-- STAGE 2: PLUGINS -->
  <rect class="box stage" x="500" y="110" width="200" height="120"/>
  <text class="label" x="520" y="140">Stage 2: Plugins</text>
  <text class="small" x="520" y="160">• Run each plugin</text>
  <text class="small" x="520" y="176">• Emit prefixed cols</text>
  <text class="small" x="520" y="192">• Buffer to temp</text>
  <text class="small" x="520" y="208">• Collect status rows</text>

  <!-- STAGE 3: MERGE -->
  <rect class="box stage" x="750" y="110" width="200" height="120"/>
  <text class="label" x="770" y="140">Stage 3: Merge</text>
  <text class="small" x="770" y="160">• Batch all plugins</text>
  <text class="small" x="770" y="176">• Left-join on keys</text>
  <text class="small" x="770" y="192">• Consolidate tracking</text>
  <text class="small" x="770" y="208">• Write final tables</text>

  <!-- OUTPUT -->
  <rect class="box output" x="1000" y="110" width="200" height="120"/>
  <text class="label" x="1020" y="140">Final Output</text>
  <text class="small" x="1020" y="160">• Parquet tables</text>
  <text class="small" x="1020" y="176">• Status/metadata</text>
  <text class="small" x="1020" y="192">• Plugin manifest</text>

  <!-- OPTIONAL ANALYSIS -->
  <rect class="box optional" x="1000" y="260" width="200" height="80"/>
  <text class="label" x="1020" y="285">Dataset Analysis</text>
  <text class="small" x="1020" y="305">(optional)</text>
  <text class="small" x="1020" y="321">dataset_analysis/*</text>

  <!-- MAIN FLOW ARROWS -->
  <path class="line" d="M 210 170 L 250 170"/>
  <path class="line" d="M 450 170 L 500 170"/>
  <path class="line" d="M 700 170 L 750 170"/>
  <path class="line" d="M 950 170 L 1000 170"/>
  <path class="soft" d="M 1100 230 L 1100 260"/>

  <!-- LANE 2: RUN-CHUNKED -->
  <line class="lane" x1="60" y1="390" x2="1220" y2="390"/>
  <text class="lane-label" x="60" y="383">Large-Scale Option A: run-chunked  (one job, internal parallelism)</text>

  <rect class="box input" x="70" y="410" width="140" height="80"/>
  <text class="label" x="85" y="440">Input</text>
  <text class="body" x="85" y="460">PDB/CIF files</text>

  <rect class="box stage" x="250" y="410" width="200" height="80"/>
  <text class="label" x="270" y="435">run-chunked</text>
  <text class="small" x="270" y="455">• Chunk internally</text>
  <text class="small" x="270" y="471">• --workers N</text>

  <rect class="box stage" x="500" y="410" width="200" height="80"/>
  <text class="label" x="520" y="435">Parallel Chunks</text>
  <text class="small" x="520" y="455">• Run prepare → plugins</text>
  <text class="small" x="520" y="471">• Per chunk</text>

  <rect class="box stage" x="750" y="410" width="200" height="80"/>
  <text class="label" x="770" y="435">Automatic Merge</text>
  <text class="small" x="770" y="455">• Merge all chunks</text>
  <text class="small" x="770" y="471">• Final output</text>

  <rect class="box output" x="1000" y="410" width="200" height="80"/>
  <text class="label" x="1020" y="435">Final Dataset</text>
  <text class="small" x="1020" y="455">• Merged tables</text>
  <text class="small" x="1020" y="471">• One directory</text>

  <path class="line" d="M 210 450 L 250 450"/>
  <path class="line" d="M 450 450 L 500 450"/>
  <path class="line" d="M 700 450 L 750 450"/>
  <path class="line" d="M 950 450 L 1000 450"/>

  <!-- LANE 3: PLAN-CHUNKS + SCHEDULER -->
  <line class="lane" x1="60" y1="570" x2="1220" y2="570"/>
  <text class="lane-label" x="60" y="563">Large-Scale Option B: plan-chunks + scheduler  (external parallelism)</text>

  <rect class="box input" x="70" y="590" width="140" height="80"/>
  <text class="label" x="85" y="620">Input</text>
  <text class="body" x="85" y="640">PDB/CIF files</text>

  <rect class="box stage" x="250" y="590" width="240" height="80"/>
  <text class="label" x="270" y="615">plan-chunks</text>
  <text class="small" x="270" y="635">Generate chunk*/config.yaml</text>
  <text class="small" x="270" y="651">Write chunk_plan.json</text>

  <rect class="box stage" x="540" y="590" width="200" height="80"/>
  <text class="label" x="560" y="615">Scheduler Jobs</text>
  <text class="small" x="560" y="635">Submit N independent</text>
  <text class="small" x="560" y="651">chunk runs (Slurm/PBS)</text>

  <rect class="box stage" x="790" y="590" width="200" height="80"/>
  <text class="label" x="810" y="615">Each Chunk</text>
  <text class="small" x="810" y="635">Run prepare → plugins</text>
  <text class="small" x="810" y="651">→ merge (per chunk)</text>

  <rect class="box stage" x="1030" y="590" width="150" height="80"/>
  <text class="label" x="1040" y="615">merge-planned-</text>
  <text class="body" x="1040" y="635">chunks</text>
  <text class="small" x="1040" y="656">Merge all outputs</text>

  <path class="line" d="M 210 630 L 250 630"/>
  <path class="line" d="M 490 630 L 540 630"/>
  <path class="line" d="M 740 630 L 790 630"/>
  <path class="line" d="M 990 630 L 1030 630"/>

  <!-- ANNOTATIONS -->
  <g>
    <text class="small" x="60" y="750">Best for Scale:</text>
    <text class="body" x="70" y="770">• run-chunked: smaller datasets (100k-500k), one queue slot, simpler</text>
    <text class="body" x="70" y="788">• plan-chunks: large datasets (500k-5M+), easy job retry, Slurm arrays, cluster integration</text>
    
    <text class="small" x="60" y="825">Key Insights:</text>
    <text class="body" x="70" y="845">1. All paths merge at the same place: merge_outputs() does batch merge of all plugins (40% faster than sequential)</text>
    <text class="body" x="70" y="863">2. Prepare writes optional prepared structures (keep_prepared_structures=False skips disk I/O)</text>
    <text class="body" x="70" y="881">3. Plugins run per-plugin (same plugin on all structures) or per-structure (all plugins on one structure)</text>
    <text class="body" x="70" y="899">4. Status/bad files tracked throughout; consolidation before final output</text>
    
    <text class="small" x="60" y="936">Data Model: Normalized tables (structures, chains, roles, interfaces) with plugin-prefixed columns, left-join on identity keys</text>
  </g>
</svg>
