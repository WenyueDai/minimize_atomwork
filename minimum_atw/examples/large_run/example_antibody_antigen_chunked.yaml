# Antibody-antigen profile for chunked / distributed runs.
#
# Run (parallel chunks):
#   python -m minimum_atw.cli run-chunked --config ... --chunk-size 50 --workers 4
#
# Run (offline plan → execute on cluster → merge):
#   python -m minimum_atw.cli plan-chunks --config ... --chunk-size 50 --plan-dir ./plan
#   # submit each chunk_*.yaml to your cluster
#   python -m minimum_atw.cli merge-planned-chunks --plan-dir ./plan --out-dir ./merged

input_dir: "/home/eva/20260202_atomworks_plug_play/atw_pp/atw_pp/examples/default_input/antibody_antigen_pdb"
out_dir: "/home/eva/minimum_atomworks/out_antibody_antigen_chunked"
assembly_id: "1"

# ── Roles & interfaces ─────────────────────────────────────────────────────────
roles:
  antigen:  ["A"]
  vh:       ["C"]
  vl:       ["B"]
  antibody: ["B", "C"]

interface_pairs:
  - ["antibody", "antigen"]

# ── Prepare phase ──────────────────────────────────────────────────────────────
manipulations:
  - name: "chain_continuity"
    grain: "pdb"
  - name: "structure_clashes"
    grain: "pdb"
  - name: "center_on_origin"
    grain: "pdb"

# ── Calculations ───────────────────────────────────────────────────────────────
plugins:
  - "identity"
  - "chain_stats"
  - "role_sequences"
  - "role_stats"
  - "interface_contacts"
  - "interface_metrics"
  - "antibody_cdr_lengths"
  - "antibody_cdr_sequences"
  - "abepitope_score"
  - "superimpose_homology"
  # - "rosetta_interface_example"

contact_distance: 5.0
abepitope_atom_radius: 4.0

# ── Per-plugin configuration ───────────────────────────────────────────────────
plugin_params:
  superimpose_homology:
    reference_path: "/home/eva/20260202_atomworks_plug_play/atw_pp/atw_pp/examples/default_input/antibody_antigen_pdb/7e9b_ag_C_ab_L_H_unrelaxed_rank_001_alphafold2_multimer_v3_model_3_seed_000_2024.pdb"
    on_chains: ["A", "B", "C"]

# ── Antibody numbering ─────────────────────────────────────────────────────────
numbering_roles: ["vh", "vl"]
numbering_scheme: "imgt"
cdr_definition: "imgt"

# ── Dataset analyses ───────────────────────────────────────────────────────────
# dataset_analysis_mode: "post_merge"   — default; runs only after final merge
# dataset_analysis_mode: "per_chunk"    — run after each chunk, merge later
# dataset_analysis_mode: "both"         — run per chunk AND after final merge
dataset_analyses:
  - "dataset_annotations"
  - "interface_summary"
  - "cluster"
  # - "cdr_entropy"
dataset_analysis_mode: "post_merge"

dataset_analysis_params: {}

dataset_annotations:
  project: "atomworks_example"
  dataset_name: "antibody_antigen_chunked"
  modality: "antibody_antigen"
  execution_mode: "run-chunked"

keep_intermediate_outputs: false
keep_prepared_structures: false
# checkpoint_enabled: true
# checkpoint_interval: 25
