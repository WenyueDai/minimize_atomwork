input_dir: "/home/eva/20260202_atomworks_plug_play/atw_pp/atw_pp/examples/default_input/antibody_antigen_pdb"
out_dir: "/home/eva/minimum_atomworks/out_antibody_antigen_chunked"
assembly_id: "1"

roles:
  antigen: ["A"]
  vh: ["C"]
  vl: ["B"]
  antibody: ["B", "C"]

interface_pairs:
  - ["antibody", "antigen"]

# Prepare-stage quality controls:
# - "chain_continuity"
# - "structure_clashes"
quality_controls:
  - "chain_continuity"
  - "structure_clashes"

# Per-structure manipulations:
# - "center_on_origin"
structure_manipulations:
  - "center_on_origin"

# Dataset-scale manipulations:
# - "superimpose_homology"
dataset_manipulations:
  - "superimpose_homology"

# Built-in PDB calculation plugins:
# - "identity"
# - "chain_stats"
# - "role_sequences"
# - "role_stats"
# - "abepitope_score"            # optional external AbEpiTope plugin; requires abepitope + hmmsearch
# - "interface_contacts"
# - "interface_metrics"
# - "antibody_cdr_lengths"
# - "antibody_cdr_sequences"
# - "rosetta_interface_example"
plugins:
  - "identity"
  - "chain_stats"
  - "role_sequences"
  - "role_stats"
  - "interface_contacts"
  - "interface_metrics"
  - "antibody_cdr_lengths"
  - "antibody_cdr_sequences"
  # - "rosetta_interface_example"

contact_distance: 5.0
# interface_cell_size: 5.0
# abepitope_atom_radius: 4.0

