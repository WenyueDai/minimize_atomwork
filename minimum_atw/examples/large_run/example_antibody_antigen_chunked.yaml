superimpose_reference_path: "/home/eva/20260202_atomworks_plug_play/atw_pp/atw_pp/examples/default_input/antibody_antigen_pdb/7e9b_ag_C_ab_L_H_unrelaxed_rank_001_alphafold2_multimer_v3_model_3_seed_000_2024.pdb"
superimpose_on_chains: ["A", "B", "C"]

keep_intermediate_outputs: false
keep_prepared_structures: false
# checkpoint_enabled: true
# checkpoint_interval: 25

# Built-in dataset analyses:
# - "dataset_annotations"
# - "interface_summary"
# - "cdr_entropy"
dataset_analyses:
  - "dataset_annotations"
  - "interface_summary"
  - "cdr_entropy"
# dataset_analysis_mode: "per_chunk"
# dataset_analysis_mode: "both"
dataset_analysis_mode: "post_merge"

dataset_analysis_params:
  cdr_entropy:
    roles: ["vh", "vl"]
    regions: ["cdr1", "cdr2", "cdr3", "sequence"]

numbering_roles:
  - "vh"
  - "vl"

numbering_scheme: "imgt"
cdr_definition: "imgt"
# numbering_scheme: "chothia"
# cdr_definition: "north"
# numbering_scheme: "kabat"
# cdr_definition: "kabat"
# numbering_scheme: "aho"
# cdr_definition: "north"

dataset_annotations:
  project: "atomworks_example"
  dataset_name: "antibody_antigen_chunked"
  modality: "antibody_antigen"
  source: "atw_pp default input"
  execution_mode: "run-chunked"
  profile: "chunked_local_dev_no_rosetta"
