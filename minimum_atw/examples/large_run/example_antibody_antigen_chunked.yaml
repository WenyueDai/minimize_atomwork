# Antibody-antigen profile for chunked / distributed runs.
#
# Internal chunk workers:
#   python -m minimum_atw.cli run-chunked \
#     --config minimum_atw/examples/large_run/example_antibody_antigen_chunked.yaml \
#     --chunk-size 50 --workers 4
#
# One-command Slurm submission:
#   python -m minimum_atw.cli submit-slurm \
#     --config minimum_atw/examples/large_run/example_antibody_antigen_chunked.yaml \
#     --chunk-size 50 \
#     --plan-dir /path/to/your/chunk_plan \
#     --mode auto \
#     --dry-run
#
# Offline plan -> scheduler -> merge:
#   python -m minimum_atw.cli plan-chunks \
#     --config minimum_atw/examples/large_run/example_antibody_antigen_chunked.yaml \
#     --chunk-size 50 --plan-dir /path/to/your/chunk_plan
#   # (run each planned chunk config yourself, or inspect chunk_plan.json)
#   python -m minimum_atw.cli merge-planned-chunks \
#     --plan-dir /path/to/your/chunk_plan \
#     --out-dir /path/to/your/out_antibody_antigen_chunked
#
# Scheduler note:
#   `submit-slurm --mode auto` reads `chunk_plan.json` and picks either one
#   mixed chunk job shape or split CPU-only and GPU-enabled stages based on
#   `resource_plan.submission_plan.recommended_mode`.

# ── Input / output ─────────────────────────────────────────────────────────────
input_dir: "/path/to/your/pdb_files"
out_dir: "/path/to/your/out_antibody_antigen_chunked"
assembly_id: "1"
# pdb_output_name: "pdb.parquet"
# dataset_output_name: "dataset.parquet"

# ── Roles & interfaces ─────────────────────────────────────────────────────────
roles:
  antigen: ["A"]
  vh: ["C"]
  vl: ["B"]
  antibody: ["B", "C"]

interface_pairs:
  - ["antibody", "antigen"]

# ── Prepare phase ──────────────────────────────────────────────────────────────
manipulations:
  - name: "chain_continuity"
    grain: "pdb"
  - name: "structure_clashes"
    grain: "pdb"
  - name: "center_on_origin"
    grain: "pdb"
  - name: "superimpose_to_reference"
    grain: "pdb"

# clash_distance: 2.0
# clash_scope: "all"

# ── Per-structure calculations ─────────────────────────────────────────────────
plugins:
  # — structure grain —
  - "identity"
  # - "superimpose_homology"    # legacy metrics-only path; leave off when superimpose_to_reference is enabled

  # — chain grain —
  - "chain_stats"

  # — role grain —
  - "role_sequences"
  - "role_stats"
  - "antibody_cdr_lengths"    # requires numbering_roles; abnumber package
  - "antibody_cdr_sequences"  # requires numbering_roles; abnumber package
  # - "esm_if1_score"           # GPU-preferred; requires torch and fair-esm
  # - "ablang2_score"           # GPU-preferred AbLang2 antibody LL per role; requires: pip install minimum-atomworks[ablang2]

  # — interface grain —
  - "interface_contacts"
  - "interface_metrics"
  - "abepitope_score"         # GPU-preferred; requires abepitope package
  - "pdockq_score"
  # - "dockq_score"             # requires reference_path in plugin_params
  # - "rosetta_interface_example"   # CPU-oriented; requires Rosetta binaries

contact_distance: 5.0           # Å cutoff for interface_contacts and dockq_score Fnat (default: 5.0)
abepitope_atom_radius: 4.0
# interface_cell_size: 5.0

# ── Plugin-specific configuration ──────────────────────────────────────────────
plugin_params:
  superimpose_to_reference:
    reference_path: "/path/to/your/reference.pdb"
    on_chains: ["A", "B", "C"]   # chains to superimpose on; full complex is transformed
    # anchor_atoms: "CA"          # CA | backbone (default: CA)

  # superimpose_homology:
  #   reference_path: "/path/to/your/reference.pdb"
  #   on_chains: ["A"]              # anchor chains for RMSD alignment

  # pdockq_score:
  #   contact_distance: 8.0      # CB-CB cutoff in Å (default: 8.0)

  # dockq_score:
  #   reference_path: "/path/to/your/native_complex.pdb"   # required
  #   receptor_role: "antigen"   # role to superimpose on for LRMS (default: right-side role)
  #   contact_distance: 5.0      # Å cutoff for Fnat contacts (default: 5.0)

  # abepitope_score:
  #   device: auto               # auto | cpu | cuda | 0 (default: auto)

  # ablang2_score:
  #   device: auto               # auto | cpu | cuda (default: auto); pair with gpu_workers/gpu_devices for scheduler-aware GPU planning

  # esm_if1_score:
  #   device: auto               # auto | cpu | cuda (default: auto); pair with gpu_workers/gpu_devices for scheduler-aware GPU planning

# ── Antibody numbering ─────────────────────────────────────────────────────────
numbering_roles: ["vh", "vl"]
numbering_scheme: "imgt"   # imgt | chothia | kabat | aho
cdr_definition: "imgt"     # imgt | north | kabat

# ── Optional Rosetta scaffold ──────────────────────────────────────────────────
# rosetta_executable: "/path/to/InterfaceAnalyzer.static.linuxgccrelease"
# rosetta_database: "/path/to/rosetta/database"
# rosetta_score_jd2_executable: "/path/to/score_jd2.static.linuxgccrelease"
# rosetta_preprocess_with_score_jd2: false
# rosetta_interface_targets:
#   - pair: ["antibody", "antigen"]
#     left_role: "antibody"
#     right_role: "antigen"

# ── Dataset analyses ───────────────────────────────────────────────────────────
dataset_analyses:
  - "dataset_annotations"
  - "interface_summary"
  - "cluster"
  # - "cdr_entropy"
dataset_analysis_mode: "post_merge"   # post_merge | per_chunk | both

dataset_analysis_params: {}
  # cdr_entropy:
  #   roles: ["vh", "vl"]
  #   regions: ["cdr1", "cdr2", "cdr3", "sequence"]
# cleanup_prepared_after_dataset_analysis: true  # delete _prepared after successful dataset analysis

dataset_annotations:
  dataset_id: "antibody_antigen_chunked"
  project: "atomworks_example"
  dataset_name: "antibody_antigen_chunked"
  modality: "antibody_antigen"
  execution_mode: "run-chunked"
# Only dataset_id and dataset_name are copied onto pdb.parquet rows.
# reference_dataset_dir: "/path/to/reference_dataset_out_dir"

# ── Runtime controls ───────────────────────────────────────────────────────────
keep_intermediate_outputs: false
keep_prepared_structures: true
checkpoint_enabled: false
# checkpoint_interval: 25
# chunk_cpu_capacity: 32     # node-level CPU budget for run-chunked / plan-chunks
# cpu_workers: 4             # per-chunk CPU plugin pool
# gpu_workers: 1             # per-chunk GPU plugin pool for abepitope_score / ablang2_score / esm_if1_score
# gpu_devices: ["0"]         # visible GPU IDs for one chunk job
# chunk_plan.json will then include both recommended_chunk_job and submission_plan hints.
