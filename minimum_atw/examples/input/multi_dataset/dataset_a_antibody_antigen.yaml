# Dataset A: antibody-antigen run with antigen-only superposition anchor.
#
# Run:
#   conda activate atw_pp
#   python -m minimum_atw.cli run \
#     --config minimum_atw/examples/multi_dataset/dataset_a_antibody_antigen.yaml
#
# Large-dataset Slurm path with the same YAML:
#   1. add `slurm.chunk_size`
#   2. python -m minimum_atw.cli submit-slurm \
#        --config minimum_atw/examples/multi_dataset/dataset_a_antibody_antigen.yaml
#
# Typical workflow for cross-dataset comparison:
#   1. Run this config for dataset A.
#   2. Copy this file to dataset_b_antibody_antigen.yaml and update input_dir/out_dir/annotations.
#   3. Merge both out_dirs with `merge-datasets`.
#   4. Run `analyze-dataset` with compare_merged_datasets.yaml.
#
# Scheduler note:
#   this source run can include GPU stages because AbEpiTope is enabled by
#   default. Keep model plugins on `device: auto`; `submit-slurm` will decide
#   whether the run stays mixed or splits CPU and GPU stages.

# ── Input / output ─────────────────────────────────────────────────────────────
input_dir: "/path/to/your/dataset_a_pdb_files"
out_dir: "/path/to/your/out_dataset_a"
assembly_id: "1"
# pdb_output_name: "pdb.parquet"
# dataset_output_name: "dataset.parquet"

# ── Roles & interfaces ─────────────────────────────────────────────────────────
roles:
  antigen: ["A"]
  vh: ["C"]
  vl: ["B"]
  antibody: ["B", "C"]
  # binder: ["B", "C"]

interface_pairs:
  - ["antibody", "antigen"]
  # - ["vh", "antigen"]

# ── Prepare phase ──────────────────────────────────────────────────────────────
manipulations:
  - name: "chain_continuity"
    grain: "pdb"
  - name: "structure_clashes"
    grain: "pdb"
  - name: "center_on_origin"
    grain: "pdb"
  - name: "superimpose_to_reference"
    grain: "pdb"
  # Alternative: Rosetta score/repack/relax then superimpose (choose one or the other).
  # - name: "rosetta_preprocess"
  #   grain: "pdb"

clash_distance: 2.0
clash_scope: "all"

# ── Per-structure calculations ─────────────────────────────────────────────────
plugins:
  # — structure grain —
  - "identity"
  # - "superimpose_homology"    # legacy metrics-only path; leave off when superimpose_to_reference is enabled

  # — chain grain —
  - "chain_stats"

  # — role grain —
  - "role_sequences"
  - "role_stats"
  - "antibody_cdr_sequences"  # requires numbering_roles; abnumber package
  # - "esm_if1_score"           # GPU-preferred; requires torch and fair-esm
  # - "ablang2_score"           # GPU-preferred AbLang2 antibody LL per role; requires: pip install minimum-atomworks[ablang2]

  # — interface grain —
  - "interface_contacts"
  - "interface_metrics"
  - "abepitope_score"         # GPU-preferred; requires abepitope package
  - "pdockq_score"
  # - "dockq_score"             # requires reference_path in plugin_params
  # - "rosetta_interface_example"   # CPU-oriented; requires Rosetta binaries

contact_distance: 5.0           # Å cutoff for interface_contacts and dockq_score Fnat (default: 5.0)
abepitope_atom_radius: 4.0
# interface_cell_size: 5.0

# ── Plugin-specific configuration ──────────────────────────────────────────────
plugin_params:
  superimpose_to_reference:
    reference_path: "/path/to/your/reference_antigen_chain_A_only.pdb"
    on_chains: ["A"]              # align on antigen only; transform the full complex before downstream calculations
    # anchor_atoms: "CA"          # CA | backbone (default: CA)
  # rosetta_preprocess:
  #   reference_path: "/path/to/your/reference.pdb"
  #   on_chains: ["A", "B", "C"]   # chains to superimpose on after Rosetta steps
  #   repack: true                  # sidechain-only optimisation (backbone fixed)
  #   relax: false                  # full fast-relax including backbone (expensive)
  # anchor_atoms: "CA"              # CA | backbone (default: CA)


  # superimpose_homology:
  #   reference_path: "/path/to/your/reference.pdb"
  #   on_chains: ["A"]              # anchor chains for RMSD alignment
  #   # persist_transformed_structures: false  # write superimposed structures to out_dir (default: false)


  # interface_contacts:
  #   include_cdr_fields: true   # annotate interface contacts with CDR region membership (default: true)
  # pdockq_score:
  #   contact_distance: 8.0      # CB-CB cutoff in Å (default: 8.0)

  # dockq_score:
  #   reference_path: "/path/to/your/native_complex.pdb"   # required
  #   receptor_role: "antigen"   # role to superimpose on for LRMS (default: right-side role)
  #   contact_distance: 5.0      # Å cutoff for Fnat contacts (default: 5.0)

  # abepitope_score:
  #   device: auto               # auto | cpu | cuda | 0 (default: auto)

  # ablang2_score:
  #   device: auto               # auto | cpu | cuda (default: auto); leave on auto unless you need to force CPU or CUDA
  #   on_roles: []               # restrict scoring to specific roles, e.g. ["vh", "vl"]; [] or omit = all roles

  # esm_if1_score:
  #   device: auto               # auto | cpu | cuda (default: auto); leave on auto unless you need to force CPU or CUDA
  #   on_roles: []               # restrict scoring to specific roles, e.g. ["vh", "vl"]; [] or omit = all roles

# ── Antibody numbering ─────────────────────────────────────────────────────────
numbering_roles: ["vh", "vl"]
numbering_scheme: "imgt"   # imgt | chothia | kabat | aho
cdr_definition: "imgt"     # imgt | north | kabat

# ── Optional Rosetta scaffold ──────────────────────────────────────────────────
# rosetta_executable: "/path/to/InterfaceAnalyzer.static.linuxgccrelease"
# rosetta_database: "/path/to/rosetta/database"
# rosetta_score_jd2_executable: "/path/to/score_jd2.static.linuxgccrelease"
# rosetta_relax_executable: "/path/to/relax.static.linuxgccrelease"
# rosetta_preprocess: true   # false → skip Rosetta steps; only superimpose
# rosetta_preprocess_with_score_jd2: false
# rosetta_interface_targets:
#   - pair: ["antibody", "antigen"]
#     left_role: "antibody"
#     right_role: "antigen"
# rosetta_pack_input: true
# rosetta_pack_separated: true
# rosetta_compute_packstat: true
# rosetta_add_regular_scores_to_scorefile: true
# rosetta_packstat_oversample: 100
# rosetta_atomic_burial_cutoff: 0.01
# rosetta_sasa_calculator_probe_radius: 1.4
# rosetta_interface_cutoff: 8.0

# ── Dataset analyses ───────────────────────────────────────────────────────────
dataset_analyses:
  - "dataset_annotations"
  - "interface_summary"
  - "cluster"
  # - "cdr_entropy"
dataset_analysis_mode: "post_merge"   # post_merge | per_chunk | both

dataset_analysis_params:
  cluster:
    jobs:
      - name: "within_dataset_paratope"
        mode: "absolute_interface_ca"
        interface_side: "left"
        distance_threshold: 2.0
      - name: "within_dataset_epitope"
        mode: "absolute_interface_ca"
        interface_side: "right"
        distance_threshold: 2.0
  # cdr_entropy:
  #   roles: ["vh", "vl"]
  #   regions: ["cdr1", "cdr2", "cdr3", "sequence"]
# cleanup_prepared_after_dataset_analysis: true  # delete _prepared after successful dataset analysis

dataset_annotations:
  project: "cross_dataset_compare"
  dataset_name: "dataset_a"
  dataset_id: "dataset_a"
  modality: "antibody_antigen"
  notes: "source dataset A; aligned on antigen chain A only"
  # Only dataset_id and dataset_name are copied onto pdb.parquet rows.
# reference_dataset_dir: "/path/to/your/reference_dataset_out_dir"

# ── Runtime controls ───────────────────────────────────────────────────────────
keep_intermediate_outputs: false
keep_prepared_structures: true
checkpoint_enabled: false
# checkpoint_interval: 25
# cpu_workers: 4            # optional local override for CPU parallelism
# gpu_workers: 1            # optional local override for GPU-capable plugins
# gpu_devices: ["0"]        # optional visible GPU IDs for local or scheduled GPU runs
# slurm:
#   chunk_size: 50          # minimum needed for `submit-slurm --config <this_file>`
