# Local ready-to-run antibody-antigen example using the bundled example data.
# Full non-Rosetta stack: all CPU and GPU plugins enabled.
#
# One-line run on a personal workstation with one GPU:
#   conda activate atw_pp
#   python -m minimum_atw.cli run \
#     --config minimum_atw/examples/input/simple_run/example_antibody_antigen_realdata_all_non_rosetta.yaml
#
# What this enables:
#   - real structures from minimum_atw/examples/data/antibody_antigen
#   - bundled-data role mapping: antigen=A-E, vh=F, vl=G
#   - prepare-stage superimposition via superimpose_to_reference
#   - the full non-Rosetta mixed CPU/GPU calculation stack
#   - ESM-IF1 and AbLang2 scored on antibody roles only (on_roles)
#
# Intentional omissions:
#   - rosetta_interface_example is off (Rosetta binaries not required)

# ── Input / output ─────────────────────────────────────────────────────────────
input_dir: "minimum_atw/examples/data/antibody_antigen"
out_dir: "minimum_atw/examples/output/simple_run/minimum_atw_realdata_all_non_rosetta"
assembly_id: "1"
# pdb_output_name: "pdb.parquet"
# dataset_output_name: "dataset.parquet"

# ── Roles & interfaces ─────────────────────────────────────────────────────────
roles:
  antigen: ["A", "B", "C", "D", "E"]
  vh: ["F"]
  vl: ["G"]
  antibody: ["F", "G"]

interface_pairs:
  - ["antibody", "antigen"]

# ── Prepare phase ──────────────────────────────────────────────────────────────
manipulations:
  - name: "chain_continuity"
    grain: "pdb"
  - name: "structure_clashes"
    grain: "pdb"
  - name: "center_on_origin"
    grain: "pdb"
  - name: "superimpose_to_reference"
    grain: "pdb"

clash_distance: 2.0
clash_scope: "all"             # all | inter_chain | interface_only

# ── Per-structure calculations ─────────────────────────────────────────────────
plugins:
  # — structure grain —
  - "identity"

  # — chain grain —
  - "chain_stats"

  # — role grain —
  - "role_sequences"
  - "role_stats"
  - "antibody_cdr_sequences"
  - "esm_if1_score"            # GPU-preferred; requires torch and fair-esm
  - "ablang2_score"            # GPU-preferred; requires: pip install minimum-atomworks[ablang2]

  # — interface grain —
  - "interface_contacts"
  - "interface_metrics"
  - "abepitope_score"          # GPU-preferred; requires abepitope package
  - "pdockq_score"
  - "dockq_score"
  # - "rosetta_interface_example"   # CPU-oriented; requires Rosetta binaries

contact_distance: 5.0          # Å cutoff for interface_contacts and dockq_score Fnat (default: 5.0)
abepitope_atom_radius: 4.0
# interface_cell_size: 5.0

# ── Plugin-specific configuration ──────────────────────────────────────────────
plugin_params:
  superimpose_to_reference:
    reference_path: "minimum_atw/examples/data/antibody_antigen/rank01_design_spec_5.cif"
    on_chains: ["A", "B", "C", "D", "E"]
    # anchor_atoms: "CA"         # CA | backbone (default: CA)

  interface_contacts:
    include_cdr_fields: true   # annotate interface contacts with CDR region membership (default: true)

  pdockq_score:
    contact_distance: 8.0      # CB-CB cutoff in Å (default: 8.0)

  dockq_score:
    reference_path: "minimum_atw/examples/data/antibody_antigen/rank01_design_spec_5.cif"
    receptor_role: "antigen"
    contact_distance: 5.0       # Å cutoff for Fnat contacts (default: 5.0)

  abepitope_score:
    device: "auto"              # auto | cpu | cuda | 0 (default: auto)

  ablang2_score:
    device: "auto"              # auto | cpu | cuda (default: auto)

  esm_if1_score:
    device: "auto"              # auto | cpu | cuda (default: auto)
    on_roles: ["vh", "vl", "antibody"]  # restrict scoring to specific roles; [] or omit = all roles

# ── Antibody numbering ─────────────────────────────────────────────────────────
numbering_roles: ["vh", "vl"]
numbering_scheme: "imgt"       # imgt | chothia | kabat | aho
cdr_definition: "imgt"         # imgt | north | kabat

# ── Optional Rosetta scaffold ──────────────────────────────────────────────────
# rosetta_executable: "/path/to/InterfaceAnalyzer.static.linuxgccrelease"
# rosetta_database: "/path/to/rosetta/database"   # folder from Rosetta GitHub; contains scoring/, sequence/, ...
# rosetta_score_jd2_executable: "/path/to/score_jd2.static.linuxgccrelease"
# rosetta_relax_executable: "/path/to/relax.static.linuxgccrelease"
# Singularity: set each executable to a wrapper script that calls
#   singularity exec --bind /scratch:/scratch <sif> <tool> "$@"
# rosetta_preprocess: true   # false → skip Rosetta steps; only superimpose
# rosetta_preprocess_with_score_jd2: false
# rosetta_interface_targets:
#   - pair: ["antibody", "antigen"]
#     left_role: "antibody"
#     right_role: "antigen"
# rosetta_pack_input: true
# rosetta_pack_separated: true
# rosetta_compute_packstat: true
# rosetta_add_regular_scores_to_scorefile: true
# rosetta_packstat_oversample: 100
# rosetta_atomic_burial_cutoff: 0.01
# rosetta_sasa_calculator_probe_radius: 1.4
# rosetta_interface_cutoff: 8.0

# ── Dataset analyses ───────────────────────────────────────────────────────────
dataset_analyses:
  - "dataset_annotations"
  - "interface_summary"
  - "cluster"
  - "cdr_entropy"
dataset_analysis_mode: "post_merge"   # post_merge | per_chunk | both

dataset_analysis_params:
  cluster:
    # Two clustering modes (set mode explicitly to enable clustering):
    #   absolute_interface_ca — "where does it bind?" uses absolute Cα positions after global
    #     superimposition (superimpose_to_reference in prepare); distinguishes binding sites.
    #   shape_interface_ca   — "how does it bind?" locally superimposes interface Cα (Kabsch)
    #     then computes Chamfer; distinguishes binding geometry regardless of site.
    mode: "absolute_interface_ca"    # or "shape_interface_ca"
    distance_threshold: 5.0    # Å; default 2.0 is very tight — increase if each structure ends up alone
    # jobs:                     # define separate named jobs per side or mode, e.g.:
    #   - name: "epitope_site"
    #     interface_side: "right"
    #     mode: "absolute_interface_ca"
    #     distance_threshold: 5.0
    #   - name: "epitope_shape"
    #     interface_side: "right"
    #     mode: "shape_interface_ca"
    #     distance_threshold: 3.0
  cdr_entropy:
    roles: ["vh", "vl"]
    regions: ["cdr1", "cdr2", "cdr3", "sequence"]
# cleanup_prepared_after_dataset_analysis: false

dataset_annotations:
  dataset_id: "realdata_all_non_rosetta"
  dataset_name: "realdata_all_non_rosetta"
  project: "atomworks_example"
  modality: "antibody_antigen"
  profile: "all_non_rosetta"
# reference_dataset_dir: "/path/to/reference_dataset_out_dir"
# Only dataset_id and dataset_name are copied onto pdb.parquet rows.

# ── Runtime controls ───────────────────────────────────────────────────────────
keep_intermediate_outputs: true
keep_prepared_structures: true
checkpoint_enabled: false
# checkpoint_interval: 25      # resume prepare/plugin runs after interruptions (default: 100)
cpu_workers: 1
gpu_workers: 1
gpu_devices: ["0"]
# slurm:
#   chunk_size: 50             # minimum needed for `submit-slurm --config <this_file>`
