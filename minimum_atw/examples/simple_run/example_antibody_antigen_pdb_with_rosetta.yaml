input_dir: "/home/eva/20260202_atomworks_plug_play/atw_pp/atw_pp/examples/default_input/antibody_antigen_pdb"
out_dir: "/home/eva/minimum_atomworks/out_antibody_antigen_pdb_with_rosetta"
assembly_id: "1"

roles:
  antigen: ["A"]
  vh: ["C"]
  vl: ["B"]
  antibody: ["B", "C"]

interface_pairs:
  - ["antibody", "antigen"]

# Built-in manipulations:
# - "center_on_origin"
# - "superimpose_homology"
manipulations:
  - "center_on_origin"
  - "superimpose_homology"

# Built-in record plugins:
# - "identity"
# - "chain_stats"
# - "role_sequences"
# - "role_stats"
# - "interface_contacts"
# - "antibody_cdr_lengths"
# - "antibody_cdr_sequences"
# - "rosetta_interface_example"   # requires Rosetta, slow but high-quality metrics
plugins:
  - "identity"
  - "chain_stats"
  - "role_sequences"
  - "role_stats"
  - "interface_contacts"          # also writes per-CDR interface columns when numbering_roles is set
  - "antibody_cdr_lengths"
  - "antibody_cdr_sequences"
  - "rosetta_interface_example"   # ADDED: high-quality binding metrics from Rosetta

contact_distance: 5.0

# Rosetta InterfaceAnalyzer configuration (required for rosetta_interface_example plugin)
# Set these to match your Rosetta installation, or leave as-is if Rosetta is in your PATH
rosetta_executable: "/opt/rosetta/main/source/bin/InterfaceAnalyzer.static.linuxgccrelease"
rosetta_database: "/opt/rosetta/main/database"

superimpose_reference_path: "/home/eva/20260202_atomworks_plug_play/atw_pp/atw_pp/examples/default_input/antibody_antigen_pdb/7e9b_ag_C_ab_L_H_unrelaxed_rank_001_alphafold2_multimer_v3_model_3_seed_000_2024.pdb"
superimpose_on_chains: ["A", "B", "C"]
# One-shot runs keep only final outputs in out_dir.
keep_intermediate_outputs: false

# Built-in dataset analyses:
# - "dataset_annotations"
# - "interface_summary"
# - "cdr_entropy"
dataset_analyses:
  - "dataset_annotations"
  - "interface_summary"
  - "cdr_entropy"

numbering_roles:
  - "vh"
  - "vl"

# With the numbering roles above, interface_contacts also annotates interfaces.parquet with:
# - iface__left_vh_cdr{1,2,3}_interface_residues
# - iface__left_vl_cdr{1,2,3}_interface_residues
# - matching iface__n_* count columns
# Residue lists use chain:resi:resn with 1-letter residue codes.

# Optional AbNumber configuration for CDR extraction.
numbering_scheme: "imgt"
cdr_definition: "imgt"
# numbering_scheme: "chothia"
# cdr_definition: "north"
# numbering_scheme: "kabat"
# cdr_definition: "kabat"
# numbering_scheme: "aho"
# cdr_definition: "north"

dataset_annotations:
  project: "atomworks_example"
  dataset_name: "antibody_antigen_pdb_with_rosetta"
