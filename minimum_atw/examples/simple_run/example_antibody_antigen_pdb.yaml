# Full antibody-antigen profile: all native plugins + AbEpiTope + superimpose.
#
# One-shot run:
#   python -m minimum_atw.cli run \
#     --config minimum_atw/examples/simple_run/example_antibody_antigen_pdb.yaml
#
# Useful staged commands:
#   python -m minimum_atw.cli prepare          --config <this_file>
#   python -m minimum_atw.cli run-plugin       --config <this_file> --plugin abepitope_score
#   python -m minimum_atw.cli run-plugins      --config <this_file> --plugins interface_contacts interface_metrics abepitope_score
#   python -m minimum_atw.cli merge            --config <this_file>
#   python -m minimum_atw.cli analyze-dataset  --config <this_file>

# ── Input / output ─────────────────────────────────────────────────────────────
input_dir: "/path/to/your/pdb_files"
out_dir: "/path/to/your/out_antibody_antigen_pdb"
assembly_id: "1"
# pdb_output_name: "pdb.parquet"
# dataset_output_name: "dataset.parquet"

# ── Roles & interfaces ─────────────────────────────────────────────────────────
roles:
  antigen: ["A"]
  vh: ["C"]
  vl: ["B"]
  antibody: ["B", "C"]

interface_pairs:
  - ["antibody", "antigen"]

# ── Prepare phase ──────────────────────────────────────────────────────────────
# Prepare plugins are configured here as `{name, grain}` items.
# quality_controls:
#   - "chain_continuity"
#   - "structure_clashes"
manipulations:
  - name: "chain_continuity"
    grain: "pdb"
  - name: "structure_clashes"
    grain: "pdb"
  - name: "center_on_origin"
    grain: "pdb"
  - name: "superimpose_to_reference"
    grain: "pdb"

# clash_distance: 2.0
# clash_scope: "all"

# ── Per-structure calculations ─────────────────────────────────────────────────
plugins:
  - "identity"
  - "chain_stats"
  - "role_sequences"
  - "role_stats"
  - "interface_contacts"
  - "interface_metrics"
  - "antibody_cdr_lengths"
  - "antibody_cdr_sequences"
  - "abepitope_score"
  # - "rosetta_interface_example"

contact_distance: 5.0
abepitope_atom_radius: 4.0
# interface_cell_size: 5.0

# ── Plugin-specific configuration ──────────────────────────────────────────────
plugin_params:
  superimpose_to_reference:
    reference_path: "/path/to/your/reference.pdb"
    on_chains: ["A", "B", "C"]
  # superimpose_to_reference:
  #   reference_path: "/path/to/your/antigen_only_reference.pdb"
  #   on_chains: ["A"]  # align on antigen only, but transform the full complex
# superimpose_reference_path: "/path/to/reference.pdb"
# superimpose_on_chains: ["A", "B", "C"]

# ── Antibody numbering ─────────────────────────────────────────────────────────
numbering_roles: ["vh", "vl"]
numbering_scheme: "imgt"
cdr_definition: "imgt"

# ── Optional Rosetta scaffold ──────────────────────────────────────────────────
# rosetta_executable: "/path/to/InterfaceAnalyzer.static.linuxgccrelease"
# rosetta_database: "/path/to/rosetta/database"
# rosetta_score_jd2_executable: "/path/to/score_jd2.static.linuxgccrelease"
# rosetta_preprocess_with_score_jd2: false
# rosetta_interface_targets:
#   - pair: ["antibody", "antigen"]
#     left_role: "antibody"
#     right_role: "antigen"
# rosetta_pack_input: true
# rosetta_pack_separated: true
# rosetta_compute_packstat: true
# rosetta_add_regular_scores_to_scorefile: true
# rosetta_packstat_oversample: 100
# rosetta_atomic_burial_cutoff: 0.01
# rosetta_sasa_calculator_probe_radius: 1.4
# rosetta_interface_cutoff: 8.0

# ── Dataset analyses ───────────────────────────────────────────────────────────
dataset_analyses:
  - "dataset_annotations"
  - "interface_summary"
  - "cluster"
  # - "cdr_entropy"
dataset_analysis_mode: "post_merge"

dataset_analysis_params: {}
  # cdr_entropy:
  #   roles: ["vh", "vl"]
  #   regions: ["cdr1", "cdr2", "cdr3", "sequence"]
# cleanup_prepared_after_dataset_analysis: true  # delete _prepared after successful dataset analysis

dataset_annotations:
  dataset_id: "antibody_antigen_full"
  project: "atomworks_example"
  dataset_name: "antibody_antigen_full"
  modality: "antibody_antigen"
  source: "atw_pp default input"
  profile: "full_non_rosetta"
# Only dataset_id and dataset_name are copied onto pdb.parquet rows.
# reference_dataset_dir: "/path/to/reference_dataset_out_dir"

# ── Runtime controls ───────────────────────────────────────────────────────────
keep_intermediate_outputs: false
keep_prepared_structures: true
checkpoint_enabled: false
# checkpoint_interval: 25
