# Full antibody-antigen profile: all native plugins + AbEpiTope + superimpose.
#
# Run:
#   python -m minimum_atw.cli run --config example_antibody_antigen_pdb.yaml

input_dir: "/home/eva/20260202_atomworks_plug_play/atw_pp/atw_pp/examples/default_input/antibody_antigen_pdb"
out_dir: "/home/eva/minimum_atomworks/out_antibody_antigen_pdb"
assembly_id: "1"

# ── Roles & interfaces ─────────────────────────────────────────────────────────
roles:
  antigen:  ["A"]
  vh:       ["C"]
  vl:       ["B"]
  antibody: ["B", "C"]

interface_pairs:
  - ["antibody", "antigen"]

# ── Prepare phase ──────────────────────────────────────────────────────────────
manipulations:
  - name: "chain_continuity"
    grain: "pdb"
  - name: "structure_clashes"
    grain: "pdb"
  - name: "center_on_origin"
    grain: "pdb"

# ── Calculations ───────────────────────────────────────────────────────────────
plugins:
  - "identity"
  - "chain_stats"
  - "role_sequences"
  - "role_stats"
  - "interface_contacts"
  - "interface_metrics"
  - "antibody_cdr_lengths"
  - "antibody_cdr_sequences"
  - "abepitope_score"
  - "superimpose_homology"
  # - "rosetta_interface_example"

contact_distance: 5.0
abepitope_atom_radius: 4.0

# ── Per-plugin configuration ───────────────────────────────────────────────────
plugin_params:
  superimpose_homology:
    reference_path: "/home/eva/20260202_atomworks_plug_play/atw_pp/atw_pp/examples/default_input/antibody_antigen_pdb/7e9b_ag_C_ab_L_H_unrelaxed_rank_001_alphafold2_multimer_v3_model_3_seed_000_2024.pdb"
    on_chains: ["A", "B", "C"]

# ── Rosetta scaffold (commented out) ──────────────────────────────────────────
# Uncomment rosetta_interface_example in plugins: above, then fill these in.
# rosetta_executable: "/path/to/InterfaceAnalyzer.static.linuxgccrelease"
# rosetta_database: "/path/to/rosetta/database"
# rosetta_preprocess_with_score_jd2: true
# rosetta_score_jd2_executable: "/path/to/score_jd2.static.linuxgccrelease"
# rosetta_interface_targets:
#   - pair: ["antibody", "antigen"]
#     left_role: "antibody"
#     right_role: "antigen"

# ── Antibody numbering ─────────────────────────────────────────────────────────
numbering_roles: ["vh", "vl"]
numbering_scheme: "imgt"
cdr_definition: "imgt"

# ── Dataset analyses ───────────────────────────────────────────────────────────
dataset_analyses:
  - "dataset_annotations"
  - "interface_summary"
  - "cluster"
  # - "cdr_entropy"
dataset_analysis_mode: "post_merge"

dataset_analysis_params: {}
  # cdr_entropy:
  #   roles: ["vh", "vl"]
  #   regions: ["cdr1", "cdr2", "cdr3", "sequence"]

dataset_annotations:
  project: "atomworks_example"
  dataset_name: "antibody_antigen_full"
  modality: "antibody_antigen"
  source: "atw_pp default input"
  profile: "full_non_rosetta"

# ── Optional / advanced ────────────────────────────────────────────────────────
keep_intermediate_outputs: false
keep_prepared_structures: false
# checkpoint_enabled: true
# checkpoint_interval: 25
