superimpose_reference_path: "/home/eva/20260202_atomworks_plug_play/atw_pp/atw_pp/examples/default_input/antibody_antigen_pdb/7e9b_ag_C_ab_L_H_unrelaxed_rank_001_alphafold2_multimer_v3_model_3_seed_000_2024.pdb"
superimpose_on_chains: ["A", "B", "C"]
keep_intermediate_outputs: false
keep_prepared_structures: false
# checkpoint_enabled: true
# checkpoint_interval: 25

dataset_analyses:
  - "dataset_annotations"
  - "interface_summary"
  - "cluster"
# dataset_analysis_mode: "per_chunk"
# dataset_analysis_mode: "both"
dataset_analysis_mode: "post_merge"

dataset_annotations:
  project: "atomworks_example"
  dataset_name: "generic_protein_protein_reframing_of_antibody_example"
  modality: "protein_protein"
  source: "atw_pp default input reinterpreted as a generic protein complex"
  notes: "generic multi-chain receptor-ligand complex with semantic alias roles for plug-and-play interface analysis"
  profile: "generic_non_antibody_example"
