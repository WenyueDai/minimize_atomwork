input_dir: "/home/eva/20260202_atomworks_plug_play/atw_pp/atw_pp/examples/default_input/antibody_antigen_pdb"
out_dir: "/home/eva/minimum_atomworks/out_protein_protein_complex"
# pdb_output_name: "20250212_pdb.parquet"
# dataset_output_name: "20250212_dataset.parquet"
assembly_id: "1"

roles:
  receptor: ["B", "C"]
  ligand: ["A"]
  complex_left: ["A"]
  complex_right: ["B", "C"]

interface_pairs:
  - ["ligand", "receptor"]
  - ["complex_left", "complex_right"]

quality_controls:
  - "chain_continuity"
  - "structure_clashes"

structure_manipulations:
  - "center_on_origin"

dataset_manipulations:
  - "superimpose_homology"

# Native atom-array plugins are batched together.
# External/file-bound plugins such as optional Rosetta run in isolated workers.
# Those groups can run concurrently during one pipeline execution.
plugins:
  - "identity"
  - "chain_stats"
  - "role_sequences"
  - "role_stats"
  - "interface_contacts"
  - "interface_metrics"
  # - "abepitope_score"
  # - "antibody_cdr_lengths"
  # - "antibody_cdr_sequences"
  # - "rosetta_interface_example"

contact_distance: 5.0
# interface_cell_size: 5.0
# abepitope_atom_radius: 4.0

