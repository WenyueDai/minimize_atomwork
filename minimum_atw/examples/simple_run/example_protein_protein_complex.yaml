# Generic protein-protein complex profile.
# No antibody-specific plugins by default.
#
# Run:
#   python -m minimum_atw.cli run \
#     --config minimum_atw/examples/simple_run/example_protein_protein_complex.yaml
#
# Optional HPC path with the same YAML:
#   1. add `slurm.chunk_size`
#   2. python -m minimum_atw.cli submit-slurm \
#        --config minimum_atw/examples/simple_run/example_protein_protein_complex.yaml
#
# Stage-by-stage:
#   python -m minimum_atw.cli prepare          --config <this_file>
#   python -m minimum_atw.cli run-plugins      --config <this_file> --plugins interface_contacts interface_metrics
#   python -m minimum_atw.cli merge            --config <this_file>
#   python -m minimum_atw.cli analyze-dataset  --config <this_file>
#
# Scheduler note:
#   this profile is CPU-oriented by default. If you later enable a GPU-capable
#   model plugin such as esm_if1_score, keep `device: auto` and let
#   `submit-slurm` decide whether GPU stages are needed.

# ── Input / output ─────────────────────────────────────────────────────────────
input_dir: "/path/to/your/protein_protein_pdb_files"
out_dir: "/path/to/your/out_protein_protein"
assembly_id: "1"
# pdb_output_name: "pdb.parquet"
# dataset_output_name: "dataset.parquet"

# ── Roles & interfaces ─────────────────────────────────────────────────────────
roles:
  receptor: ["B", "C"]
  ligand: ["A"]
  # binder: ["B", "C"]
  # target: ["A"]

interface_pairs:
  - ["ligand", "receptor"]
  # - ["binder", "target"]

# ── Prepare phase ──────────────────────────────────────────────────────────────
manipulations:
  - name: "chain_continuity"
    grain: "pdb"
  - name: "structure_clashes"
    grain: "pdb"
  - name: "center_on_origin"
    grain: "pdb"
  # - name: "superimpose_to_reference"
  #   grain: "pdb"               # enable only when you have a real reference_path below

# clash_distance: 2.0
# clash_scope: "all"

# ── Per-structure calculations ─────────────────────────────────────────────────
plugins:
  # — structure grain —
  - "identity"
  # - "superimpose_homology"    # requires reference_path in plugin_params

  # — chain grain —
  - "chain_stats"

  # — role grain —
  - "role_sequences"
  - "role_stats"
  # - "antibody_cdr_lengths"    # requires numbering_roles; abnumber package
  # - "antibody_cdr_sequences"  # requires numbering_roles; abnumber package
  # - "esm_if1_score"           # GPU-preferred; requires torch and fair-esm
  # - "ablang2_score"           # GPU-preferred AbLang2 antibody LL per role; antibody-specific; requires: pip install minimum-atomworks[ablang2]

  # — interface grain —
  - "interface_contacts"
  - "interface_metrics"
  - "pdockq_score"
  # - "abepitope_score"         # only for antibody-antigen style inputs; requires abepitope package
  # - "dockq_score"             # requires reference_path in plugin_params
  # - "rosetta_interface_example"   # CPU-oriented; requires Rosetta binaries

contact_distance: 5.0           # Å cutoff for interface_contacts and dockq_score Fnat (default: 5.0)
# interface_cell_size: 5.0
# abepitope_atom_radius: 4.0

# ── Plugin-specific configuration ──────────────────────────────────────────────
# plugin_params:
#   superimpose_to_reference:
#     reference_path: "/path/to/reference.pdb"
#     on_chains: ["A", "B", "C"]
#     # anchor_atoms: "CA"       # CA | backbone (default: CA)
#
#   superimpose_homology:
#     reference_path: "/path/to/reference.pdb"
#     on_chains: ["A"]
#     # persist_transformed_structures: false  # write superimposed structures to out_dir (default: false)
#

#   interface_contacts:
#     include_cdr_fields: true   # annotate interface contacts with CDR region membership (default: true)
#   pdockq_score:
#     contact_distance: 8.0     # CB-CB cutoff in Å (default: 8.0)
#
#   dockq_score:
#     reference_path: "/path/to/your/native_complex.pdb"   # required
#     receptor_role: "receptor"  # role to superimpose on for LRMS (default: right-side role)
#     contact_distance: 5.0     # Å cutoff for Fnat contacts (default: 5.0)
#
#   esm_if1_score:
#     device: auto              # auto | cpu | cuda (default: auto); leave on auto unless you need to force CPU or CUDA
#     on_roles: []              # restrict scoring to specific roles, e.g. ["vh", "vl"]; [] or omit = all roles

# ── Antibody-only knobs (leave commented here) ────────────────────────────────
# numbering_roles: ["vh", "vl"]
# numbering_scheme: "imgt"   # imgt | chothia | kabat | aho
# cdr_definition: "imgt"     # imgt | north | kabat

# ── Optional Rosetta scaffold ──────────────────────────────────────────────────
# rosetta_executable: "/path/to/InterfaceAnalyzer.static.linuxgccrelease"
# rosetta_database: "/path/to/rosetta/database"
# rosetta_score_jd2_executable: "/path/to/score_jd2.static.linuxgccrelease"
# rosetta_relax_executable: "/path/to/relax.static.linuxgccrelease"
# rosetta_preprocess: true   # false → skip Rosetta steps; only superimpose
# rosetta_preprocess_with_score_jd2: false
# rosetta_interface_targets:
#   - pair: ["ligand", "receptor"]
#     left_role: "ligand"
#     right_role: "receptor"
# rosetta_pack_input: true
# rosetta_pack_separated: true
# rosetta_compute_packstat: true
# rosetta_add_regular_scores_to_scorefile: true
# rosetta_packstat_oversample: 100
# rosetta_atomic_burial_cutoff: 0.01
# rosetta_sasa_calculator_probe_radius: 1.4
# rosetta_interface_cutoff: 8.0

# ── Dataset analyses ───────────────────────────────────────────────────────────
dataset_analyses:
  - "dataset_annotations"
  - "interface_summary"
  - "cluster"
  # - "cdr_entropy"
dataset_analysis_mode: "post_merge"   # post_merge | per_chunk | both
dataset_analysis_params: {}
# cleanup_prepared_after_dataset_analysis: true  # delete _prepared after successful dataset analysis
dataset_annotations:
  dataset_id: "protein_protein_complex"
  project: "atomworks_example"
  dataset_name: "protein_protein_complex"
  modality: "protein_protein"
# Only dataset_id and dataset_name are copied onto pdb.parquet rows.
# reference_dataset_dir: "/path/to/reference_dataset_out_dir"

# ── Runtime controls ───────────────────────────────────────────────────────────
keep_intermediate_outputs: false
keep_prepared_structures: false
checkpoint_enabled: false
# checkpoint_interval: 25
# cpu_workers: 4            # optional local override for CPU parallelism
# gpu_workers: 1            # optional local override if you enable GPU-capable plugins
# gpu_devices: ["0"]        # optional visible GPU IDs for local or scheduled GPU runs
# slurm:
#   chunk_size: 50          # minimum needed for `submit-slurm --config <this_file>`
