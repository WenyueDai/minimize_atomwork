# Generic protein-protein complex profile.
# No antibody-specific plugins — works for any receptor-ligand pair.
#
# Run:
#   python -m minimum_atw.cli run --config example_protein_protein_complex.yaml

input_dir: "/home/eva/20260202_atomworks_plug_play/atw_pp/atw_pp/examples/default_input/antibody_antigen_pdb"
out_dir: "/home/eva/minimum_atomworks/out_protein_protein"
assembly_id: "1"

# ── Roles & interfaces ─────────────────────────────────────────────────────────
# Adapt chain IDs and role names to your complex.
roles:
  receptor: ["B", "C"]
  ligand:   ["A"]

interface_pairs:
  - ["ligand", "receptor"]

# ── Prepare phase ──────────────────────────────────────────────────────────────
manipulations:
  - name: "chain_continuity"
    grain: "pdb"
  - name: "structure_clashes"
    grain: "pdb"
  - name: "center_on_origin"
    grain: "pdb"

# ── Calculations ───────────────────────────────────────────────────────────────
plugins:
  - "identity"
  - "chain_stats"
  - "role_sequences"
  - "role_stats"
  - "interface_contacts"
  - "interface_metrics"
  - "superimpose_homology"
  # - "abepitope_score"
  # - "antibody_cdr_lengths"
  # - "antibody_cdr_sequences"
  # - "rosetta_interface_example"

contact_distance: 5.0

# ── Per-plugin configuration ───────────────────────────────────────────────────
plugin_params:
  superimpose_homology:
    reference_path: "/path/to/reference.pdb"
    on_chains: ["A", "B", "C"]

# ── Dataset analyses ───────────────────────────────────────────────────────────
dataset_analyses:
  - "dataset_annotations"
  - "interface_summary"
  - "cluster"
dataset_analysis_mode: "post_merge"

dataset_annotations:
  project: "atomworks_example"
  dataset_name: "protein_protein_complex"
  modality: "protein_protein"

keep_intermediate_outputs: false
keep_prepared_structures: false
