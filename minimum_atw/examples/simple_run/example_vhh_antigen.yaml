# VHH-antigen profile: single-domain antibody against a multi-chain antigen.
#
# Run:
#   python -m minimum_atw.cli run --config example_vhh_antigen.yaml

input_dir: "/home/eva/20260202_atomworks_plug_play/atw_pp/atw_pp/examples/default_input/antibody_antigen_pdb"
out_dir: "/home/eva/minimum_atomworks/out_vhh_antigen"
assembly_id: "1"

# ── Roles & interfaces ─────────────────────────────────────────────────────────
roles:
  antigen: ["A", "B"]
  vhh:     ["C"]
  binder:  ["C"]

interface_pairs:
  - ["vhh", "antigen"]
  - ["binder", "antigen"]

# ── Prepare phase ──────────────────────────────────────────────────────────────
manipulations:
  - name: "chain_continuity"
    grain: "pdb"
  - name: "structure_clashes"
    grain: "pdb"
  - name: "center_on_origin"
    grain: "pdb"

# ── Calculations ───────────────────────────────────────────────────────────────
plugins:
  - "identity"
  - "chain_stats"
  - "role_sequences"
  - "role_stats"
  - "interface_contacts"
  - "interface_metrics"
  - "antibody_cdr_lengths"
  - "antibody_cdr_sequences"
  - "abepitope_score"
  - "superimpose_homology"
  # - "rosetta_interface_example"

contact_distance: 5.0
abepitope_atom_radius: 4.0

# ── Per-plugin configuration ───────────────────────────────────────────────────
plugin_params:
  superimpose_homology:
    reference_path: "/home/eva/20260202_atomworks_plug_play/atw_pp/atw_pp/examples/default_input/antibody_antigen_pdb/7e9b_ag_C_ab_L_H_unrelaxed_rank_001_alphafold2_multimer_v3_model_3_seed_000_2024.pdb"
    on_chains: ["A", "B", "C"]

# ── Antibody numbering ─────────────────────────────────────────────────────────
numbering_roles: ["vhh"]
numbering_scheme: "imgt"
cdr_definition: "imgt"

# ── Dataset analyses ───────────────────────────────────────────────────────────
dataset_analyses:
  - "dataset_annotations"
  - "interface_summary"
  - "cluster"
  # - "cdr_entropy"
dataset_analysis_mode: "post_merge"

dataset_analysis_params: {}
  # cdr_entropy:
  #   roles: ["vhh"]
  #   regions: ["cdr1", "cdr2", "cdr3", "sequence"]

dataset_annotations:
  project: "atomworks_example"
  dataset_name: "vhh_antigen"
  modality: "vhh_antigen"
  notes: "single-chain binder; binder role mirrors vhh for interface-level workflows"

keep_intermediate_outputs: false
keep_prepared_structures: false
