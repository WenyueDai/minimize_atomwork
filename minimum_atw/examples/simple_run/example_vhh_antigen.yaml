input_dir: "/home/eva/20260202_atomworks_plug_play/atw_pp/atw_pp/examples/default_input/antibody_antigen_pdb"
out_dir: "/home/eva/minimum_atomworks/out_vhh_antigen"
assembly_id: "1"

roles:
  antigen: ["A", "B"]
  vhh: ["C"]
  binder: ["C"]

interface_pairs:
  - ["vhh", "antigen"]
  - ["binder", "antigen"]

# Built-in manipulations:
# - "center_on_origin"
# - "superimpose_homology"
manipulations:
  - "center_on_origin"
  - "superimpose_homology"

# Built-in record plugins:
# - "identity"
# - "chain_stats"
# - "role_sequences"
# - "role_stats"
# - "interface_contacts"
# - "antibody_cdr_lengths"
# - "antibody_cdr_sequences"
# - "rosetta_interface_example"   # requires Rosetta, disabled by default
plugins:
  - "identity"
  - "chain_stats"
  - "role_sequences"
  - "role_stats"
  - "interface_contacts"          # also writes per-CDR interface columns for vhh when numbering_roles is set
  - "antibody_cdr_lengths"
  - "antibody_cdr_sequences"
  # - "rosetta_interface_example"

contact_distance: 5.0
rosetta_executable: "/opt/rosetta/main/source/bin/InterfaceAnalyzer.static.linuxgccrelease"
rosetta_database: "/opt/rosetta/main/database"
superimpose_reference_path: "/home/eva/20260202_atomworks_plug_play/atw_pp/atw_pp/examples/default_input/antibody_antigen_pdb/7e9b_ag_C_ab_L_H_unrelaxed_rank_001_alphafold2_multimer_v3_model_3_seed_000_2024.pdb"
superimpose_on_chains: ["A", "B", "C"]
# One-shot runs keep only final outputs in out_dir.
keep_intermediate_outputs: false

# Built-in dataset analyses:
# - "dataset_annotations"
# - "interface_summary"
# - "cdr_entropy"
dataset_analyses:
  - "dataset_annotations"
  - "interface_summary"
  - "cdr_entropy"

# dataset_analysis_params:
#   cdr_entropy:
#     roles: ["vhh"]
#     regions: ["cdr3"]
#   cdr_entropy:
#     roles: ["vhh"]
#     regions: ["cdr1", "cdr2", "cdr3"]
#   cdr_entropy:
#     roles: ["vhh"]
#     regions: ["sequence"]

numbering_roles:
  - "vhh"

# With the numbering role above, interface_contacts also annotates interfaces.parquet with:
# - iface__left_vhh_cdr{1,2,3}_interface_residues
# - matching iface__n_left_vhh_cdr{1,2,3}_interface_residues count columns
# Residue lists use chain:resi:resn with 1-letter residue codes.

numbering_scheme: "imgt"
cdr_definition: "imgt"
# numbering_scheme: "chothia"
# cdr_definition: "north"
# numbering_scheme: "kabat"
# cdr_definition: "kabat"
# numbering_scheme: "aho"
# cdr_definition: "north"

dataset_annotations:
  project: "atomworks_example"
  dataset_name: "vhh_antigen_reframing_of_antibody_example"
  modality: "vhh_antigen"
  source: "atw_pp default input reinterpreted as VHH-antigen"
  notes: "single-chain binder against a multi-chain antigen; binder role mirrors vhh for interface-level workflows"
  rosetta_plugin_note: "Configured but not enabled in plugins by default because Rosetta is an external dependency"
