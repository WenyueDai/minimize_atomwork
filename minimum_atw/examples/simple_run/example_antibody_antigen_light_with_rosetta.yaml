input_dir: "/home/eva/20260202_atomworks_plug_play/atw_pp/atw_pp/examples/default_input/antibody_antigen_pdb"
out_dir: "/home/eva/minimum_atomworks/out_antibody_antigen_pdb_light_with_rosetta"
assembly_id: "1"

roles:
  antigen: ["A"]
  vh: ["C"]
  vl: ["B"]
  antibody: ["B", "C"]

interface_pairs:
  - ["antibody", "antigen"]

# Light setup: minimal plugins for fast analysis + Rosetta metrics
# Skips: superimpose_homology (alignment overhead), antibody numbering (if not needed)
manipulations:
  - "center_on_origin"
  # - "superimpose_homology"     # skip this for faster runs

plugins:
  - "identity"
  - "chain_stats"
  - "role_sequences"
  - "role_stats"
  - "interface_contacts"          # fast, just contact distance
  # - "antibody_cdr_lengths"      # skip antibody features if not needed
  # - "antibody_cdr_sequences"
  - "rosetta_interface_example"   # ADDED: single external tool call for quality metrics

contact_distance: 5.0

# Rosetta InterfaceAnalyzer configuration (required for rosetta_interface_example plugin)
# Set these to match your Rosetta installation, or leave as-is if Rosetta is in your PATH
rosetta_executable: "/opt/rosetta/main/source/bin/InterfaceAnalyzer.static.linuxgccrelease"
rosetta_database: "/opt/rosetta/main/database"

superimpose_reference_path: "/home/eva/20260202_atomworks_plug_play/atw_pp/atw_pp/examples/default_input/antibody_antigen_pdb/7e9b_ag_C_ab_L_H_unrelaxed_rank_001_alphafold2_multimer_v3_model_3_seed_000_2024.pdb"
superimpose_on_chains: ["A", "B", "C"]
# One-shot runs keep only final outputs in out_dir.
keep_intermediate_outputs: false

# Minimal dataset analyses
dataset_analyses:
  - "dataset_annotations"
  - "interface_summary"
  # - "cdr_entropy"               # skip this for faster runs

# Skip numbering for maximum speed (unless you need CDR interface columns)
numbering_roles:
  - "vh"
  - "vl"

numbering_scheme: "imgt"
cdr_definition: "imgt"

dataset_annotations:
  project: "atomworks_example"
  dataset_name: "antibody_antigen_pdb_light_with_rosetta"
  modality: "antibody_antigen"
  source: "atw_pp default input"
