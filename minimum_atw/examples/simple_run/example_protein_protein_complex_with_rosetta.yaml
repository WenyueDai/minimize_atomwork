input_dir: "/home/eva/20260202_atomworks_plug_play/atw_pp/atw_pp/examples/default_input/antibody_antigen_pdb"
out_dir: "/home/eva/minimum_atomworks/out_protein_protein_complex_with_rosetta"
assembly_id: "1"

roles:
  receptor: ["B", "C"]
  ligand: ["A"]
  complex_left: ["A"]
  complex_right: ["B", "C"]

interface_pairs:
  - ["ligand", "receptor"]
  - ["complex_left", "complex_right"]

# Built-in manipulations:
# - "center_on_origin"
# - "superimpose_homology"
manipulations:
  - "center_on_origin"
  - "superimpose_homology"

# Built-in record plugins:
# - "identity"
# - "chain_stats"
# - "role_sequences"
# - "role_stats"
# - "interface_contacts"
# - "antibody_cdr_lengths"        # antibody-only, left disabled here
# - "antibody_cdr_sequences"      # antibody-only, left disabled here
# - "rosetta_interface_example"   # requires Rosetta, now ENABLED for quality metrics
plugins:
  - "identity"
  - "chain_stats"
  - "role_sequences"
  - "role_stats"
  - "interface_contacts"          # generic interface outputs only; no antibody CDR interface columns in this config
  # - "antibody_cdr_lengths"
  # - "antibody_cdr_sequences"
  - "rosetta_interface_example"   # ADDED: high-quality binding metrics from Rosetta

contact_distance: 5.0

# Rosetta InterfaceAnalyzer configuration (required for rosetta_interface_example plugin)
rosetta_executable: "/opt/rosetta/main/source/bin/InterfaceAnalyzer.static.linuxgccrelease"
rosetta_database: "/opt/rosetta/main/database"

superimpose_reference_path: "/home/eva/20260202_atomworks_plug_play/atw_pp/atw_pp/examples/default_input/antibody_antigen_pdb/7e9b_ag_C_ab_L_H_unrelaxed_rank_001_alphafold2_multimer_v3_model_3_seed_000_2024.pdb"
superimpose_on_chains: ["A", "B", "C"]
# One-shot runs keep only final outputs in out_dir.
keep_intermediate_outputs: false

# Built-in dataset analyses:
# - "dataset_annotations"
# - "interface_summary"
# - "cdr_entropy"                 # antibody-only, left disabled here
dataset_analyses:
  - "dataset_annotations"
  - "interface_summary"
  # - "cdr_entropy"

dataset_annotations:
  project: "atomworks_example"
  dataset_name: "generic_protein_protein_with_rosetta"
  modality: "protein_protein"
  source: "atw_pp default input reinterpreted as a generic protein complex"
  notes: "generic multi-chain receptor-ligand complex with semantic alias roles for plug-and-play interface analysis; includes Rosetta metrics for binding evaluation"
