# Minimal antibody-antigen profile — interface metrics only, no superimposition.
# Use this as a starting point when you do not have a reference structure yet
# or just want basic interface analysis with minimal configuration.
#
# For the full profile (CDR plugins, AbEpiTope, superimposition), see:
#   example_antibody_antigen_pdb.yaml
#
# One-shot run:
#   python -m minimum_atw.cli run \
#     --config minimum_atw/examples/simple_run/example_antibody_antigen_light.yaml
#
# Staged workflow:
#   python -m minimum_atw.cli prepare          --config <this_file>
#   python -m minimum_atw.cli run-plugin       --config <this_file> --plugin interface_contacts
#   python -m minimum_atw.cli merge            --config <this_file>
#   python -m minimum_atw.cli analyze-dataset  --config <this_file>

# ── Input / output ─────────────────────────────────────────────────────────────
input_dir: "/path/to/your/pdb_files"
out_dir: "/path/to/your/out_antibody_antigen_light"
assembly_id: "1"
# pdb_output_name: "pdb.parquet"
# dataset_output_name: "dataset.parquet"

# ── Roles & interfaces ─────────────────────────────────────────────────────────
roles:
  antigen: ["A"]
  vh: ["C"]
  vl: ["B"]
  antibody: ["B", "C"]
  # binder: ["B", "C"]   # optional alias

interface_pairs:
  - ["antibody", "antigen"]

# ── Prepare phase ──────────────────────────────────────────────────────────────
manipulations:
  - name: "chain_continuity"
    grain: "pdb"
  - name: "structure_clashes"
    grain: "pdb"
  - name: "center_on_origin"
    grain: "pdb"
  # - name: "superimpose_to_reference"   # enable when you have a reference_path
  #   grain: "pdb"

# clash_distance: 2.0
# clash_scope: "all"        # all | inter_chain | interface_only

# ── Per-structure calculations ─────────────────────────────────────────────────
plugins:
  - "identity"
  - "interface_contacts"
  - "interface_metrics"
  # - "chain_stats"
  # - "role_sequences"
  # - "role_stats"
  # - "antibody_cdr_lengths"    # requires numbering_roles below
  # - "antibody_cdr_sequences"  # requires numbering_roles below
  # - "abepitope_score"         # requires abepitope package installed

contact_distance: 5.0
# abepitope_atom_radius: 4.0
# interface_cell_size: 5.0

# ── Plugin-specific configuration ──────────────────────────────────────────────
# plugin_params:
#   superimpose_to_reference:
#     reference_path: "/path/to/reference.pdb"
#     on_chains: ["A", "B", "C"]

# ── Antibody numbering ─────────────────────────────────────────────────────────
# Uncomment when enabling antibody_cdr_lengths / antibody_cdr_sequences:
# numbering_roles: ["vh", "vl"]
# numbering_scheme: "imgt"   # imgt | chothia | kabat | aho
# cdr_definition: "imgt"     # imgt | north | kabat

# ── Dataset analyses ───────────────────────────────────────────────────────────
dataset_analyses:
  - "dataset_annotations"
  - "interface_summary"
  - "cluster"
  # - "cdr_entropy"
dataset_analysis_mode: "post_merge"   # post_merge | per_chunk | both

dataset_analysis_params: {}
  # cdr_entropy:
  #   roles: ["vh", "vl"]
  #   regions: ["cdr1", "cdr2", "cdr3", "sequence"]
# cleanup_prepared_after_dataset_analysis: true

dataset_annotations:
  dataset_id: "antibody_antigen_light"
  project: "atomworks_example"
  dataset_name: "antibody_antigen_light"
  modality: "antibody_antigen"
# Only dataset_id and dataset_name are copied onto pdb.parquet rows.

# ── Runtime controls ───────────────────────────────────────────────────────────
keep_intermediate_outputs: false
keep_prepared_structures: true
checkpoint_enabled: false
# checkpoint_interval: 25   # resume prepare/plugin runs after interruptions
