# Smoke-test config for rosetta_preprocess manipulation with rosetta_preprocess: false.
#
# With rosetta_preprocess: false the Rosetta scoring/repack/relax steps are
# skipped and the manipulation degrades to a plain superimposition — identical
# in behaviour to superimpose_to_reference but using the rosprep__ column prefix.
# This lets you verify the full pipeline (prepare → plugins → dataset analysis)
# without Rosetta binaries.
#
# Run from the repo root:
#   python -m minimum_atw.cli run \
#     --config minimum_atw/examples/test/test_rosetta_preprocess_no_rosetta.yaml

# ── Input / output ─────────────────────────────────────────────────────────────
input_dir: "minimum_atw/examples/data/antibody_antigen"
out_dir: "/tmp/minimum_atw_test_rosprep_no_rosetta"
assembly_id: "1"

# ── Roles & interfaces ─────────────────────────────────────────────────────────
roles:
  antigen: ["A", "B", "C", "D", "E"]
  vh: ["F"]
  vl: ["G"]
  antibody: ["F", "G"]

interface_pairs:
  - ["antibody", "antigen"]

# ── Prepare phase ──────────────────────────────────────────────────────────────
manipulations:
  - name: "chain_continuity"
    grain: "pdb"
  - name: "structure_clashes"
    grain: "pdb"
  - name: "center_on_origin"
    grain: "pdb"
  - name: "rosetta_preprocess"
    grain: "pdb"

# rosetta_preprocess: false → skip Rosetta steps; only superimpose to reference.
rosetta_preprocess: false

# ── Per-structure calculations ─────────────────────────────────────────────────
plugins:
  - "identity"
  - "chain_stats"
  - "role_sequences"
  - "role_stats"
  - "antibody_cdr_lengths"
  - "antibody_cdr_sequences"
  - "interface_contacts"
  - "interface_metrics"
  - "abepitope_score"
  - "pdockq_score"
  - "dockq_score"
  - "esm_if1_score"
  - "ablang2_score"

contact_distance: 5.0
abepitope_atom_radius: 4.0
gpu_workers: 1

# ── Plugin-specific configuration ──────────────────────────────────────────────
plugin_params:
  rosetta_preprocess:
    reference_path: "minimum_atw/examples/data/antibody_antigen/rank01_design_spec_5.cif"
    on_chains: ["A", "B", "C", "D", "E"]
    repack: false   # no effect when rosetta_preprocess: false
    relax: false

  dockq_score:
    reference_path: "minimum_atw/examples/data/antibody_antigen/rank01_design_spec_5.cif"
    receptor_role: "antigen"
    contact_distance: 5.0

  abepitope_score:
    device: auto

  esm_if1_score:
    device: auto
    on_roles: []

  ablang2_score:
    device: auto
    on_roles: []

# ── Antibody numbering ─────────────────────────────────────────────────────────
numbering_roles: ["vh", "vl"]
numbering_scheme: "imgt"
cdr_definition: "imgt"

# ── Dataset analyses ───────────────────────────────────────────────────────────
dataset_analyses:
  - "dataset_annotations"
  - "interface_summary"
  - "cluster"
dataset_analysis_mode: "per_chunk"
dataset_analysis_params: {}

dataset_annotations:
  dataset_id: "test_rosprep"
  dataset_name: "test_rosprep"
  modality: "antibody_antigen"

# ── Runtime controls ───────────────────────────────────────────────────────────
keep_intermediate_outputs: false
keep_prepared_structures: true
checkpoint_enabled: false
cpu_workers: 4
