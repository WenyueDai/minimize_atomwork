# Chunk 02 — antibody-antigen manual chunk workflow.

input_dir: "/home/eva/minimum_atomworks/minimum_atw/examples/chunk_run/data/chunk_02"
out_dir: "/home/eva/minimum_atomworks/out_chunk_antibody_antigen_02"
assembly_id: "1"

# ── Roles & interfaces ─────────────────────────────────────────────────────────
roles:
  antigen:  ["A"]
  vh:       ["C"]
  vl:       ["B"]
  antibody: ["B", "C"]

interface_pairs:
  - ["antibody", "antigen"]

# ── Prepare phase ──────────────────────────────────────────────────────────────
manipulations:
  - name: "chain_continuity"
    grain: "pdb"
  - name: "structure_clashes"
    grain: "pdb"
  - name: "center_on_origin"
    grain: "pdb"

# ── Calculations ───────────────────────────────────────────────────────────────
plugins:
  - "identity"
  - "chain_stats"
  - "role_sequences"
  - "role_stats"
  - "interface_contacts"
  - "interface_metrics"
  - "antibody_cdr_lengths"
  - "antibody_cdr_sequences"
  - "abepitope_score"
  - "superimpose_homology"

contact_distance: 5.0
abepitope_atom_radius: 4.0

# ── Per-plugin configuration ───────────────────────────────────────────────────
plugin_params:
  superimpose_homology:
    reference_path: "/home/eva/minimum_atomworks/minimum_atw/examples/chunk_run/data/reference/7e9b_reference_rank_001.pdb"
    on_chains: ["A", "B", "C"]

# ── Antibody numbering ─────────────────────────────────────────────────────────
numbering_roles: ["vh", "vl"]
numbering_scheme: "imgt"
cdr_definition: "imgt"

# ── Dataset analyses ───────────────────────────────────────────────────────────
dataset_analyses:
  - "dataset_annotations"
  - "interface_summary"
  - "cluster"
dataset_analysis_mode: "per_chunk"

dataset_annotations:
  project: "atomworks_chunked_example"
  dataset_name: "antibody_antigen_chunk_02"
  modality: "antibody_antigen"
  chunk_id: "02"
