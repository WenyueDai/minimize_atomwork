# checkpoint_interval: 25

dataset_analyses:
  - "dataset_annotations"
  - "interface_summary"
  # - "cdr_entropy"
# dataset_analysis_mode: "post_merge"   # use merge-planned-chunks or analyze-dataset after merge
# dataset_analysis_mode: "both"
dataset_analysis_mode: "per_chunk"

dataset_analysis_params:
