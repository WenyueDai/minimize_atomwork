<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 920" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L0,6 L10,3 z" fill="#4a6fa5"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L0,6 L10,3 z" fill="#888"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L0,6 L10,3 z" fill="#2d6a4f"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="920" fill="#eef0f4"/>

  <!-- Header -->
  <rect x="0" y="0" width="1400" height="58" fill="#1c2541"/>
  <text x="20" y="26" font-size="20" font-weight="700" fill="white">minimum_atomworks — Module Layer Map</text>
  <text x="20" y="48" font-size="12" fill="#8899bb">How the codebase is split across layers and what each file is responsible for</text>

  <!-- ─── LAYER 1: core/ ────────────────────────────────────────────── -->
  <rect x="16" y="72" width="1368" height="348" rx="6" fill="#1d3557" opacity="0.08" stroke="#1d3557" stroke-width="1.5"/>
  <text x="28" y="94" font-size="13" font-weight="700" fill="#1d3557" letter-spacing="1">CORE LAYER  ·  minimum_atw/core/</text>
  <text x="28" y="110" font-size="10.5" fill="#555">Policy, configuration, orchestration, scheduling, execution engine, and table management.</text>

  <!-- config.py -->
  <rect x="28" y="118" width="260" height="138" rx="5" fill="white" stroke="#457b9d" stroke-width="1.5"/>
  <rect x="28" y="118" width="260" height="28" rx="5" fill="#457b9d"/>
  <rect x="28" y="134" width="260" height="12" fill="#457b9d"/>
  <text x="38" y="137" font-size="11" font-weight="700" fill="white" dominant-baseline="middle">config.py</text>
  <text x="38" y="160" font-size="10" fill="#1d3557">Config  — Pydantic BaseModel</text>
  <text x="38" y="176" font-size="10" fill="#1d3557">• input_dir, out_dir, roles</text>
  <text x="38" y="192" font-size="10" fill="#1d3557">• interfaces, plugins, workers</text>
  <text x="38" y="208" font-size="10" fill="#1d3557">• checkpoints, keep_intermediate</text>
  <text x="38" y="224" font-size="9.5" fill="#888">→ loaded once; passed as cfg</text>

  <!-- _schedule.py -->
  <rect x="300" y="118" width="260" height="138" rx="5" fill="white" stroke="#2d6a4f" stroke-width="1.5"/>
  <rect x="300" y="118" width="260" height="28" rx="5" fill="#2d6a4f"/>
  <rect x="300" y="134" width="260" height="12" fill="#2d6a4f"/>
  <text x="310" y="137" font-size="11" font-weight="700" fill="white" dominant-baseline="middle">_schedule.py</text>
  <text x="310" y="160" font-size="10" fill="#1a4a35">PluginExecutionSpec, Groups</text>
  <text x="310" y="176" font-size="10" fill="#1a4a35">resolve_plugin_specs(names, cfg)</text>
  <text x="310" y="192" font-size="10" fill="#1a4a35">plan_plugin_groups(specs)</text>
  <text x="310" y="208" font-size="10" fill="#1a4a35">plan_plugin_waves(specs)</text>
  <text x="310" y="224" font-size="9.5" fill="#888">→ pure execution planning</text>

  <!-- _execute.py -->
  <rect x="572" y="118" width="260" height="138" rx="5" fill="white" stroke="#1d3557" stroke-width="1.5"/>
  <rect x="572" y="118" width="260" height="28" rx="5" fill="#1d3557"/>
  <rect x="572" y="134" width="260" height="12" fill="#1d3557"/>
  <text x="582" y="137" font-size="11" font-weight="700" fill="white" dominant-baseline="middle">_execute.py</text>
  <text x="582" y="160" font-size="10" fill="#1d3565">run_plugins(cfg, …) — Main API</text>
  <text x="582" y="176" font-size="10" fill="#1d3565">_run_group_tasks_shared_pool</text>
  <text x="582" y="192" font-size="10" fill="#1d3565">_run_group_tasks_device_slots</text>
  <text x="582" y="208" font-size="10" fill="#1d3565">_execute_plugin_task (worker)</text>
  <text x="582" y="224" font-size="9.5" fill="#888">→ drives the parallel wave loop</text>

  <!-- _prepare.py + _merge.py -->
  <rect x="844" y="118" width="260" height="138" rx="5" fill="white" stroke="#2d6a4f" stroke-width="1.5"/>
  <rect x="844" y="118" width="260" height="28" rx="5" fill="#2d6a4f"/>
  <rect x="844" y="134" width="260" height="12" fill="#2d6a4f"/>
  <text x="854" y="137" font-size="11" font-weight="700" fill="white" dominant-baseline="middle">_prepare.py  ·  _merge.py</text>
  <text x="854" y="160" font-size="10" fill="#1a4a35">prepare_outputs(cfg)</text>
  <text x="854" y="176" font-size="10" fill="#1a4a35">merge_outputs(cfg)</text>
  <text x="854" y="192" font-size="10" fill="#1a4a35">merge_dataset_outputs(…)</text>
  <text x="854" y="208" font-size="10" fill="#1a4a35">_prepare_context (loader)</text>
  <text x="854" y="224" font-size="9.5" fill="#888">→ move to core/ as stage logic</text>

  <!-- pipeline.py -->
  <rect x="1116" y="118" width="256" height="138" rx="5" fill="white" stroke="#6d2e46" stroke-width="1.5"/>
  <rect x="1116" y="118" width="256" height="28" rx="5" fill="#6d2e46"/>
  <rect x="1116" y="134" width="256" height="12" fill="#6d2e46"/>
  <text x="1126" y="137" font-size="11" font-weight="700" fill="white" dominant-baseline="middle">pipeline.py</text>
  <text x="1126" y="160" font-size="10" fill="#4a1a30">run_pipeline(cfg)</text>
  <text x="1126" y="176" font-size="10" fill="#4a1a30">Re-exports preparation,</text>
  <text x="1126" y="192" font-size="10" fill="#4a1a30">execution, and merge APIs.</text>
  <text x="1126" y="208" font-size="10" fill="#4a1a30">Public surface for single runs.</text>
  <text x="1126" y="224" font-size="9.5" fill="#888">→ app orchestration facade</text>

  <!-- tables.py + registry.py + output_files.py -->
  <rect x="28" y="268" width="1344" height="138" rx="5" fill="white" stroke="#1c2541" stroke-width="1.5"/>
  <rect x="28" y="268" width="1344" height="28" rx="5" fill="#1c2541"/>
  <rect x="28" y="284" width="1344" height="12" fill="#1c2541"/>
  <text x="38" y="287" font-size="11" font-weight="700" fill="white" dominant-baseline="middle">Infrastructure: tables.py  ·  registry.py  ·  output_files.py  ·  extensions.py</text>
  <text x="38" y="312" font-size="10" fill="#1c2541">tables.py:  BufferedTableWriter, merge_table_frames, stack_table_frames, PDB_TABLE_NAME (parquet schema and I/O)</text>
  <text x="38" y="328" font-size="10" fill="#1c2541">registry.py:  instantiate_unit, lazy entry_point loading for plugins and extensions</text>
  <text x="38" y="344" font-size="10" fill="#1c2541">output_files.py:  PDB_OUTPUT_NAME, BAD_OUTPUT_NAME, metadata serialization paths</text>
  <text x="38" y="360" font-size="10" fill="#1c2541">extensions.py:  PluginExtensionProtocol, Registry definitions</text>
  <text x="38" y="380" font-size="9.5" fill="#888">→ internal core utilities shared across preparation and execution stages</text>

  <!-- ─── LAYER 2: runtime/ ─────────────────────────────────────────── -->
  <rect x="16" y="434" width="1368" height="184" rx="6" fill="#2d6a4f" opacity="0.07" stroke="#2d6a4f" stroke-width="1.5"/>
  <text x="28" y="456" font-size="13" font-weight="700" fill="#2d6a4f" letter-spacing="1">RUNTIME LAYER  ·  minimum_atw/runtime/</text>
  <text x="28" y="472" font-size="10.5" fill="#555">Execution mechanics, chunk planning, workspace management, and Slurm integration.</text>

  <!-- chunked.py -->
  <rect x="28" y="480" width="300" height="124" rx="5" fill="white" stroke="#2d6a4f" stroke-width="1.5"/>
  <rect x="28" y="480" width="300" height="28" rx="5" fill="#2d6a4f"/>
  <rect x="28" y="496" width="300" height="12" fill="#2d6a4f"/>
  <text x="38" y="499" font-size="11" font-weight="700" fill="white" dominant-baseline="middle">chunked.py</text>
  <text x="38" y="522" font-size="10" fill="#1a4a35">run_chunked_pipeline(cfg, …)</text>
  <text x="38" y="538" font-size="10" fill="#1a4a35">plan_chunked_pipeline(cfg, …)</text>
  <text x="38" y="554" font-size="10" fill="#1a4a35">merge_planned_chunks(…)</text>
  <text x="38" y="574" font-size="9.5" fill="#888">→ logic for splitting work</text>

  <!-- slurm.py -->
  <rect x="344" y="480" width="300" height="124" rx="5" fill="white" stroke="#2d6a4f" stroke-width="1.5"/>
  <rect x="344" y="480" width="300" height="28" rx="5" fill="#2d6a4f"/>
  <rect x="344" y="496" width="300" height="12" fill="#2d6a4f"/>
  <text x="354" y="499" font-size="11" font-weight="700" fill="white" dominant-baseline="middle">slurm.py  ✦ new after refactor</text>
  <text x="354" y="522" font-size="10" fill="#1a4a35">submit_slurm_chunked_pipeline</text>
  <text x="354" y="538" font-size="10" fill="#1a4a35">submit_slurm_plan(plan_dir, …)</text>
  <text x="354" y="554" font-size="10" fill="#1a4a35">Generates .slurm batch scripts</text>
  <text x="354" y="574" font-size="9.5" fill="#888">→ Slurm cluster orchestration</text>

  <!-- workspace.py -->
  <rect x="660" y="480" width="300" height="124" rx="5" fill="white" stroke="#2d6a4f" stroke-width="1.5"/>
  <rect x="660" y="480" width="300" height="28" rx="5" fill="#2d6a4f"/>
  <rect x="660" y="496" width="300" height="12" fill="#2d6a4f"/>
  <text x="670" y="499" font-size="11" font-weight="700" fill="white" dominant-baseline="middle">workspace.py</text>
  <text x="670" y="522" font-size="10" fill="#1a4a35">chunk_dir_name, chunk_input_paths</text>
  <text x="670" y="538" font-size="10" fill="#1a4a35">prepare_chunk_input_dir (symlink)</text>
  <text x="670" y="554" font-size="10" fill="#1a4a35">clear_final_outputs, load_manifest</text>
  <text x="670" y="574" font-size="9.5" fill="#888">→ local disk layout management</text>

  <!-- _pool.py -->
  <rect x="976" y="480" width="396" height="124" rx="5" fill="white" stroke="#c9a92c" stroke-width="1.5"/>
  <rect x="976" y="480" width="396" height="28" rx="5" fill="#c9a92c"/>
  <rect x="976" y="496" width="396" height="12" fill="#c9a92c"/>
  <text x="986" y="499" font-size="11" font-weight="700" fill="white" dominant-baseline="middle">_pool.py</text>
  <text x="986" y="522" font-size="10" fill="#7a5c00">process_or_thread_pool(max_workers, …)</text>
  <text x="986" y="538" font-size="10" fill="#7a5c00">Context manager yielding concurrent.futures.Executor.</text>
  <text x="986" y="554" font-size="10" fill="#7a5c00">Tries ProcessPool; falls back to ThreadPool on PermissionError.</text>
  <text x="986" y="584" font-size="9.5" fill="#888">→ process/thread multiplexing utility</text>

  <!-- ─── LAYER 3: plugins/ ──────────────────────────────────────────── -->
  <rect x="16" y="632" width="1368" height="244" rx="6" fill="#6d2e46" opacity="0.07" stroke="#6d2e46" stroke-width="1.5"/>
  <text x="28" y="654" font-size="13" font-weight="700" fill="#6d2e46" letter-spacing="1">PLUGINS LAYER  ·  minimum_atw/plugins/</text>
  <text x="28" y="670" font-size="10.5" fill="#555">All extension implementations. Depends on core (for base classes and context), never on runtime.</text>

  <!-- base.py -->
  <rect x="28" y="678" width="240" height="186" rx="5" fill="white" stroke="#6d2e46" stroke-width="1.5"/>
  <rect x="28" y="678" width="240" height="28" rx="5" fill="#6d2e46"/>
  <rect x="28" y="694" width="240" height="12" fill="#6d2e46"/>
  <text x="38" y="697" font-size="11" font-weight="700" fill="white" dominant-baseline="middle">base.py</text>
  <text x="38" y="720" font-size="10" fill="#4a1a30">Context: aa, chains, roles, path</text>
  <text x="38" y="736" font-size="10" fill="#4a1a30">BasePlugin: name, prefix, grain, run</text>
  <text x="38" y="752" font-size="10" fill="#4a1a30">InterfacePlugin, ChainPlugin, RolePlugin</text>
  <text x="38" y="768" font-size="10" fill="#4a1a30">Grain definitions and helper iterators.</text>
  <text x="38" y="790" font-size="9" fill="#888">→ base interfaces for all extensions</text>

  <!-- pdb/quality_control -->
  <rect x="282" y="678" width="240" height="186" rx="5" fill="white" stroke="#2d6a4f" stroke-width="1.5"/>
  <rect x="282" y="678" width="240" height="28" rx="5" fill="#2d6a4f"/>
  <rect x="282" y="694" width="240" height="12" fill="#2d6a4f"/>
  <text x="292" y="697" font-size="11" font-weight="700" fill="white" dominant-baseline="middle">pdb/quality_control/</text>
  <text x="292" y="720" font-size="10" fill="#1a4a35">config key: quality_controls</text>
  <text x="292" y="736" font-size="10" fill="#1a4a35">chain_continuity, structure_clashes</text>
  <text x="292" y="760" font-size="9" fill="#888">run(ctx) → rows with flag columns</text>
  <text x="292" y="773" font-size="9" fill="#888">registered in PDB_PREPARE_REGISTRY</text>

  <!-- pdb/manipulation -->
  <rect x="536" y="678" width="240" height="186" rx="5" fill="white" stroke="#2d6a4f" stroke-width="1.5"/>
  <rect x="536" y="678" width="240" height="28" rx="5" fill="#2d6a4f"/>
  <rect x="536" y="694" width="240" height="12" fill="#2d6a4f"/>
  <text x="546" y="697" font-size="11" font-weight="700" fill="white" dominant-baseline="middle">pdb/manipulation/</text>
  <text x="546" y="720" font-size="10" fill="#1a4a35">config key: manipulations</text>
  <text x="546" y="736" font-size="10" fill="#1a4a35">center_on_origin, superimpose</text>
  <text x="546" y="760" font-size="9" fill="#888">may mutate ctx.aa → view rebuild</text>
  <text x="546" y="773" font-size="9" fill="#888">registered in PDB_PREPARE_REGISTRY</text>

  <!-- pdb/calculation -->
  <rect x="790" y="678" width="270" height="186" rx="5" fill="white" stroke="#1d3557" stroke-width="1.5"/>
  <rect x="790" y="678" width="270" height="28" rx="5" fill="#1d3557"/>
  <rect x="790" y="694" width="270" height="12" fill="#1d3557"/>
  <text x="800" y="697" font-size="11" font-weight="700" fill="white" dominant-baseline="middle">pdb/calculation/</text>
  <text x="800" y="720" font-size="10" fill="#1d3565">config key: plugins</text>
  <text x="800" y="736" font-size="10" fill="#1d3565">identity, chain_stats, role_stats,</text>
  <text x="800" y="752" font-size="10" fill="#1d3565">interface_contacts, esmif1, ablang2</text>
  <text x="800" y="776" font-size="9" fill="#888">registered in PLUGIN_REGISTRY</text>

  <!-- dataset/calculation -->
  <rect x="1074" y="678" width="298" height="186" rx="5" fill="white" stroke="#6d2e46" stroke-width="1.5"/>
  <rect x="1074" y="678" width="298" height="28" rx="5" fill="#6d2e46"/>
  <rect x="1074" y="704" width="298" height="2" fill="#6d2e46"/>
  <text x="1084" y="697" font-size="11" font-weight="700" fill="white" dominant-baseline="middle">dataset/calculation/</text>
  <text x="1084" y="720" font-size="10" fill="#4a1a30">config key: dataset_analyses</text>
  <text x="1084" y="736" font-size="10" fill="#4a1a30">interface_summary, entropy, cluster</text>
  <text x="1084" y="752" font-size="10" fill="#4a1a30">BaseDatasetPlugin: run(DatasetCtx)</text>
  <text x="1084" y="776" font-size="9" fill="#888">registered in DATASET_CALCULATION_REGISTRY</text>

  <!-- ─── CLI / public surface ───────────────────────────────── -->
  <rect x="16" y="890" width="1368" height="112" rx="6" fill="#1c2541" opacity="0.06" stroke="#1c2541" stroke-width="1.5"/>
  <text x="28" y="912" font-size="13" font-weight="700" fill="#1c2541" letter-spacing="1">PUBLIC SURFACE  ·  minimum_atw/cli.py  ·  minimum_atw/__init__.py</text>

  <text x="28" y="830" font-size="10.5" fill="#555">CLI commands map 1-to-1 with public functions in pipeline.py / chunked.py. __init__.py re-exports the stable API.</text>

  <!-- CLI commands -->
  <rect x="28" y="840" width="1356" height="52" rx="4" fill="white" stroke="#8899bb" stroke-width="1"/>
  <text x="38" y="858" font-size="10" fill="#1c2541" font-family="'Courier New', monospace">run → run_pipeline          prepare → prepare_outputs          merge → merge_outputs          analyze-dataset → analyze_dataset_outputs</text>
  <text x="38" y="877" font-size="10" fill="#1c2541" font-family="'Courier New', monospace">run-chunked → run_chunked_pipeline     plan-chunks → plan_chunked_pipeline     merge-planned-chunks → merge_planned_chunks     merge-datasets → merge_dataset_outputs</text>

  <!-- arrows showing dependencies -->
  <line x1="486" y1="442" x2="476" y2="442" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="480" y="438" font-size="9" fill="#4a6fa5" text-anchor="middle">uses</text>

  <line x1="660" y1="230" x2="646" y2="230" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arr)"/>

</svg>
